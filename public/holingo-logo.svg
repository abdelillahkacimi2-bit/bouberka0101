<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2a6c"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </radialGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <linearGradient id="glowRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF" stopOpacity="0.8"/>
      <stop offset="100%" style="stop-color:#7B2FBE" stopOpacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- خلفية دائرية -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- حلقة توهج خارجية -->
  <circle cx="200" cy="180" r="130" fill="none" stroke="url(#glowRing)" strokeWidth="3" opacity="0.6" filter="url(#glow)"/>

  <!-- الكتب — القاعدة -->
  <!-- كتاب 3 (أسفل) -->
  <rect x="90" y="255" width="220" height="22" rx="3" fill="#4A148C" opacity="0.9"/>
  <rect x="95" y="252" width="210" height="10" rx="2" fill="#6A1B9A" opacity="0.8"/>

  <!-- كتاب 2 (وسط) -->
  <rect x="95" y="228" width="210" height="28" rx="3" fill="#311B92" opacity="0.95"/>
  <rect x="100" y="225" width="200" height="10" rx="2" fill="#4527A0"/>

  <!-- كتاب 1 (الكتاب المفتوح المائل) — الجانب الأيمن -->
  <path d="M200,200 Q280,185 295,210 L295,240 Q280,225 200,235 Z" fill="#1565C0" opacity="0.9"/>
  <!-- الجانب الأيسر -->
  <path d="M200,200 Q120,185 105,210 L105,240 Q120,225 200,235 Z" fill="#1976D2" opacity="0.9"/>
  <!-- وهج أزرق للكتاب -->
  <path d="M200,200 Q280,185 295,210 L295,240 Q280,225 200,235 Q120,225 105,240 L105,210 Q120,185 200,200" fill="none" stroke="#00D4FF" strokeWidth="1" opacity="0.5"/>

  <!-- رمز الكتاب المفتوح في المنتصف -->
  <rect x="192" y="205" width="3" height="28" rx="1" fill="white" opacity="0.3"/>

  <!-- خطوط الكتاب -->
  <line x1="120" y1="215" x2="195" y2="208" stroke="rgba(255,255,255,0.25)" strokeWidth="1.5"/>
  <line x1="118" y1="221" x2="195" y2="215" stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>
  <line x1="205" y1="208" x2="278" y2="215" stroke="rgba(255,255,255,0.25)" strokeWidth="1.5"/>
  <line x1="205" y1="215" x2="280" y2="221" stroke="rgba(255,255,255,0.2)" strokeWidth="1"/>

  <!-- الكرة الأرضية -->
  <circle cx="200" cy="155" r="62" fill="url(#globeGrad)" filter="url(#softGlow)"/>
  <!-- أوقيانوسات وقارات -->
  <ellipse cx="200" cy="155" rx="62" ry="62" fill="none" stroke="#1565C0" strokeWidth="14" strokeOpacity="0.5"/>
  <path d="M145,140 Q160,130 175,145 Q185,155 200,145 Q215,135 230,150 Q245,165 230,175 Q215,185 200,175 Q185,165 170,175 Q155,185 145,170 Z" fill="#1565C0" opacity="0.6"/>
  <path d="M155,120 Q165,110 180,120 Q190,130 200,120 Q210,110 225,120 Q235,130 225,140 Q215,150 200,140 Q185,130 170,140 Q160,150 155,140 Z" fill="#1976D2" opacity="0.5"/>
  <!-- وهج الكرة -->
  <circle cx="185" cy="140" r="20" fill="white" opacity="0.1"/>
  <!-- خطوط التوتر -->
  <ellipse cx="200" cy="155" rx="62" ry="20" fill="none" stroke="rgba(30,136,229,0.3)" strokeWidth="1"/>
  <ellipse cx="200" cy="155" rx="30" ry="62" fill="none" stroke="rgba(30,136,229,0.3)" strokeWidth="1"/>
  <!-- وجه مبتسم -->
  <circle cx="182" cy="148" r="5" fill="#1A2A6C" opacity="0.7"/>
  <circle cx="218" cy="148" r="5" fill="#1A2A6C" opacity="0.7"/>
  <circle cx="183" cy="147" r="2" fill="white" opacity="0.8"/>
  <circle cx="219" cy="147" r="2" fill="white" opacity="0.8"/>
  <path d="M185,162 Q200,172 215,162" fill="none" stroke="#1A2A6C" strokeWidth="3" strokeLinecap="round" opacity="0.7"/>

  <!-- حلقة توهج حول الكرة -->
  <circle cx="200" cy="155" r="75" fill="none" stroke="url(#glowRing)" strokeWidth="3" filter="url(#glow)" opacity="0.7"/>

  <!-- فقاعة A (يسار) -->
  <circle cx="128" cy="128" r="24" fill="#1976D2" opacity="0.9" filter="url(#glow)"/>
  <text x="128" y="135" textAnchor="middle" fontFamily="Arial Black, sans-serif" fontSize="22" fontWeight="900" fill="white">A</text>

  <!-- فقاعة شبكة (يمين) -->
  <circle cx="275" cy="128" r="24" fill="#7B2FBE" opacity="0.9" filter="url(#glow)"/>
  <!-- رمز شبكة -->
  <circle cx="275" cy="128" r="12" fill="none" stroke="white" strokeWidth="2"/>
  <line x1="275" y1="116" x2="275" y2="140" stroke="white" strokeWidth="1.5"/>
  <ellipse cx="275" cy="128" rx="7" ry="12" fill="none" stroke="white" strokeWidth="1.5"/>

  <!-- نقاط نجوم صغيرة -->
  {['160,100', '240,98', '145,178', '255,175', '120,155', '280,155'].map}
  <circle cx="160" cy="100" r="2" fill="white" opacity="0.6"/>
  <circle cx="240" cy="98" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="145" cy="175" r="2" fill="white" opacity="0.5"/>
  <circle cx="258" cy="172" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="118" cy="160" r="1.5" fill="#00D4FF" opacity="0.8"/>
  <circle cx="283" cy="158" r="1.5" fill="#00D4FF" opacity="0.8"/>

  <!-- نص Holingo -->
  <text x="200" y="315" textAnchor="middle"
        fontFamily="Arial Black, Helvetica, sans-serif"
        fontSize="54" fontWeight="900"
        fill="url(#textGrad)"
        filter="url(#glow)">Holingo</text>

  <!-- خط منحني أسفل النص -->
  <path d="M145,325 Q200,340 255,325" fill="none" stroke="url(#textGrad)" strokeWidth="3" strokeLinecap="round" opacity="0.6"/>
</svg>
